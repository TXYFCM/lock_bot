<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开发机集群资源监控</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- ====== Login Form ====== -->
<div id="login-form" class="login-container" style="display:none">
  <h1>开发机集群资源监控</h1>
  <div class="login-card">
    <h2>Lock Bot 登录</h2>
    <input id="login-username" type="text" placeholder="用户名" autocomplete="username">
    <input id="login-password" type="password" placeholder="密码" autocomplete="current-password">
    <button id="login-btn">登 录</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint">登录后自动接入 Lock Bot + 监控数据</div>
  </div>
</div>

<!-- ====== Dashboard ====== -->
<div id="dashboard" style="display:block">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <h1 style="margin:0">开发机集群资源监控</h1>
  </div>
  <div id="loading-msg" style="text-align:center;padding:60px;color:#64748b;font-size:15px;">正在加载…</div>
  <div class="stats-bar" id="stats-bar">
    <div class="stats-bar-row" id="stats-row-1"></div>
    <div class="stats-bar-row" id="stats-row-2"></div>
  </div>
  <div class="status-bar" id="status-bar" style="display:none"></div>

  <div class="view-bar">
    <div class="type-toggles" id="type-toggles">
      <span class="type-btn active" data-type="all">全部</span>
      <span class="type-btn" data-type="personal">个人</span>
    </div>
    <div class="legend-items" id="legend-items" style="display:none">
      <div class="legend-item"><span class="legend-line" style="background:#4f46e5"></span><span>XPU 使用率</span></div>
      <div class="legend-item"><span class="legend-line" style="background:#ea580c"></span><span>显存利用率</span></div>
      <div class="legend-item"><span style="width:14px;height:14px;display:inline-block;border-radius:3px;background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.35)"></span><span>Lock Bot 锁记录</span></div>
      <div class="legend-item"><span style="width:1px;height:14px;background:#dc2626;display:inline-block;"></span><span>当前时间</span></div>
    </div>
    <span id="status-mini" style="margin-left:auto;font-size:11px;display:flex;align-items:center;gap:6px;"></span>
  </div>

  <div id="personal-view" style="display:none">
    <div class="filters">
      <label>状态：</label>
      <span class="status-btn active" data-status="ALL">全部</span>
      <span class="status-btn" data-status="FREE">FREE</span>
      <span class="status-btn" data-status="PARTIAL">PARTIAL</span>
      <span class="status-btn" data-status="BUSY">BUSY</span>
      <input class="search-input" id="search" placeholder="搜索节点...">
      <label>排序：</label>
      <span class="status-btn" data-sort="util-desc">XPU利用率 ↓</span>
      <span class="status-btn" data-sort="mem-desc">显存 ↓</span>
    </div>
    <div id="node-list" style="position:relative;padding-top:18px;"></div>
  </div>

  <!-- Average View -->
  <div id="average-view">
    <div class="avg-controls">
      <label>日期</label>
      <input type="date" id="avg-filter-date">
      <div class="window-toggles" id="avg-window-toggles">
        <span class="win-btn" data-window="1">5m</span>
        <span class="win-btn active" data-window="2">10m</span>
        <span class="win-btn" data-window="6">30m</span>
        <span class="win-btn" data-window="12">1h</span>
      </div>
    </div>
    <div class="charts-row" id="avg-charts-row">
      <div class="chart-panel">
        <div class="chart-panel-title">XPU利用率趋势</div>
        <div class="chart-wrap" id="avg-xpu-chart-wrap"><canvas id="avg-xpu-chart"></canvas></div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-title">显存利用率趋势</div>
        <div class="chart-wrap" id="avg-mem-chart-wrap"><canvas id="avg-mem-chart"></canvas></div>
      </div>
    </div>
  </div>
</div>

<!-- ====== Error Overlay ====== -->
<div class="error-overlay hidden" id="error-overlay">
  <div class="error-card">
    <div class="error-icon">⚠️</div>
    <div class="error-title">数据加载失败</div>
    <div class="error-detail" id="error-detail">Lock Bot 和监控数据均无法获取<br>请检查网络连接或联系管理员</div>
    <div class="error-meta" id="error-meta"></div>
    <div class="error-actions">
      <button class="primary" id="error-retry-btn">&#x21bb; 重新加载</button>
      <button id="error-logout-btn">返回登录</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { loginLockBot, fetchLockBotList, fetchLockBotState, fetchLockBotOccupancy, fetchMonqueryUtilization, fetchMonqueryNodeUtilization, fetchMonqueryCardUtilizationBatches, isAbortError, MONITORED_NODES } from './api.js';
import { adaptNodeData, mergeMonqueryData } from './adapter.js';
import { drawUtilLine, captureLayerSnapshot, bindCanvasHover as bindTimelineCanvasHover } from './timeline.js';

const SLOT_COUNT = 288; // 24h / 5min = 288 槽
const tooltip = document.getElementById('tooltip');

const now = new Date();
let nowIdx = now.getHours() * 12 + Math.floor(now.getMinutes() / 5);

let nodes = [];
let activeType = 'ALL';
let activeStatus = 'ALL';
let activeSort = '';
let token = null;
const expandedNodes = new Set(); // NODE 类型展开的节点名
let refreshTimer = null;
let allBots = [];
let consecutiveFailures = 0;
let lastSuccessTime = null;
let loadSeq = 0;
let monqueryMergedData = [];
let currentLoadPhase = 'idle';

// Average view state
let viewType = 'all';  // 'all' | 'personal'
let avgWindow = 2;
let avgTodayXpuMA = [], avgTodayMemMA = [];
let avgYestXpuMA = null, avgYestMemMA = null;
let avgTodayNodes = [], avgYestNodes = [];
let avgCutoffSlot = 287;
let avgRefreshTimer = null;
const AVG_MARGIN = { top: 10, right: 16, bottom: 20, left: 48 };
const XPU_TICKS = [0, 5, 10, 15, 20, 25, 30, 35];
const MEM_TICKS = [0, 10, 20, 30, 40, 50, 60, 70];

// ---- 工具函数 ----

function formatDateStart(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}${m}${day}000000`;
}

function formatDateTime(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  return `${y}${m}${day}${h}${min}${s}`;
}

function formatDateEnd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}235959`;
}

function avgGetTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function avgGetSelectedDate() {
  const v = document.getElementById('avg-filter-date').value;
  return v ? new Date(v + 'T00:00:00') : new Date();
}

// ---- Average view data processing ----

function processMonqueryData(monqueryData) {
  if (!monqueryData) return [];
  const dummyState = {};
  for (const id of MONITORED_NODES) dummyState[`gpu-node-${String(id).padStart(2,'0')}`] = {};
  return adaptNodeData(dummyState, monqueryData, 0, 'NODE', []).filter(n => n.hasMonqueryData);
}

function computeMA(nodes, windowSize) {
  const n = nodes.filter(x => x.hasMonqueryData);
  if (!n.length) return { xpu: new Array(SLOT_COUNT).fill(0), mem: new Array(SLOT_COUNT).fill(0) };

  const xpuSlot = new Array(SLOT_COUNT).fill(0);
  const memSlot = new Array(SLOT_COUNT).fill(0);
  for (let i = 0; i < SLOT_COUNT; i++) {
    let xs = 0, ms = 0;
    for (const node of n) { xs += node.avgUtil[i]; ms += node.avgMemUtil[i]; }
    xpuSlot[i] = xs / n.length;
    memSlot[i] = ms / n.length;
  }

  const xpuMA = new Array(SLOT_COUNT), memMA = new Array(SLOT_COUNT);
  for (let i = 0; i < SLOT_COUNT; i++) {
    const s = Math.max(0, i - windowSize + 1), cnt = i - s + 1;
    let xs = 0, ms = 0;
    for (let j = s; j <= i; j++) { xs += xpuSlot[j]; ms += memSlot[j]; }
    xpuMA[i] = xs / cnt;
    memMA[i] = ms / cnt;
  }
  return { xpu: xpuMA, mem: memMA };
}

// ---- 登录逻辑 ----

// Token 持久化
const SESSION_KEY = 'xpu_monitor_session';
function saveSession() {
  try {
    const username = document.getElementById('login-username').value.trim();
    localStorage.setItem(SESSION_KEY, JSON.stringify({ token, username, savedAt: Date.now() }));
  } catch (e) { /* localStorage 不可用则跳过 */ }
}
function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch (e) { /* ignore */ }
}
function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() - data.savedAt > 4 * 3600 * 1000) { clearSession(); return null; } // 4 小时过期
    return data;
  } catch (e) { clearSession(); return null; }
}

async function handleLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const loginBtn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');

  if (!username || !password) {
    errorEl.textContent = '请输入用户名和密码';
    return;
  }

  loginBtn.disabled = true;
  errorEl.textContent = '';

  try {
    token = await loginLockBot(username, password);
    const bots = await fetchLockBotList(token);

    if (!bots || !bots.length) throw new Error('无可用 Bot，请先创建');

    allBots = bots;
    saveSession();
    document.getElementById('loading-msg').remove();

    // 首次加载
    const status = await loadAllData();
    renderStatusBar(status);

    // 定时器
    startAutoRefresh();
    startNowLineTimer();
  } catch (err) {
    // 认证成功但数据拉取失败 → 仍然进入仪表盘，显示错误状态
    if (token) {
      saveSession();
      document.getElementById('loading-msg').remove();
      renderStatusBar({
        lockBot: { ok: false, failedBotIds: [0], totalBots: 0 },
        monquery: { ok: false, errorMessage: err.message },
        nodeDataQuality: {},
        lastUpdated: Date.now(),
      });
      startAutoRefresh();
      startNowLineTimer();
      return;
    }
    // 认证失败 → 留在登录页
    clearSession();
    loginBtn.disabled = false;
    errorEl.textContent = `登录失败：${err.message}`;
  }
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    if (document.hidden) return;
    // Refresh active view
    if (viewType === 'all') {
      if (document.getElementById('avg-filter-date').value === avgGetTodayStr()) {
        try { await avgLoadAndRender(); } catch(e) { console.error('Avg auto-refresh:', e); }
      }
    } else {
      try {
        const status = await loadAllData();
        renderStatusBar(status);
      } catch (e) {
        if (!isAbortError(e)) {
          console.error('Auto-refresh failed:', e);
          showToast('数据刷新失败：' + e.message, 5000);
        }
      }
    }
  }, 60000);
}

// ---- Now Line 动态更新 ----

let nowLineTimer = null;

function startNowLineTimer() {
  if (nowLineTimer) clearInterval(nowLineTimer);
  nowLineTimer = setInterval(() => {
    updateNowIdx();
  }, 60000);
}

function updateNowIdx() {
  const prevIdx = nowIdx;
  nowIdx = calcNowIdx();

  // 如果跨了 5 分钟槽，更新 currentUtil
  if (nowIdx !== prevIdx) {
    const effectiveIdx = Math.max(0, nowIdx - 1);
    for (const node of nodes) {
      node.currentUtil = node.avgUtil[effectiveIdx];
      node.currentMemUtil = node.avgMemUtil[effectiveIdx];
    }
    renderStats();
  }

  repositionNowLine();
}

function calcNowIdx() {
  const d = new Date();
  return d.getHours() * 12 + Math.floor(d.getMinutes() / 5);
}

function repositionNowLine() {
  const container = document.getElementById('node-list');
  const line = container.querySelector('.global-now-line');
  if (!line) return;
  const firstTimeline = container.querySelector('.timeline-container');
  if (!firstTimeline) return;
  const containerRect = container.getBoundingClientRect();
  const timelineRect = firstTimeline.getBoundingClientRect();
  const offsetLeft = timelineRect.left - containerRect.left;
  const timelineWidth = timelineRect.width;
  const lineLeft = offsetLeft + (nowIdx / SLOT_COUNT) * timelineWidth;
  const timeH = Math.floor(nowIdx / 12);
  const timeM = (nowIdx % 12) * 5;
  const timeStr = `${timeH}:${String(timeM).padStart(2, '0')}`;
  line.style.left = lineLeft + 'px';
  const label = line.querySelector('.global-now-label');
  if (label) label.textContent = timeStr;
}

async function loadAllData() {
  const seq = ++loadSeq;
  monqueryMergedData = [];
  currentLoadPhase = 'lockbot';
  const status = {
    lockBot: { ok: true, failedBotIds: [], totalBots: allBots.length },
    monquery: { ok: true, errorMessage: '', phase: 'lockbot', cardLoading: false },
    nodeDataQuality: {},
    lastUpdated: Date.now(),
  };

  const now = new Date();
  const start = formatDateStart(now);
  const end = formatDateTime(now);

  // 1. 拉取 Lock Bot 状态 + 历史占用记录（并行，都很快）
  const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const [stateResults, occupancyResults] = await Promise.all([
    Promise.all(
      allBots.map(bot =>
        fetchLockBotState(bot.id, token)
          .then(state => ({ state, botType: bot.bot_type }))
          .catch(err => {
            console.error(`Bot ${bot.id} fetch failed:`, err);
            status.lockBot.failedBotIds.push(bot.id);
            return null;
          })
      )
    ),
    Promise.all(
      allBots.map(bot =>
        fetchLockBotOccupancy(bot.id, today, token).catch(() => [])
      )
    ),
  ]);
  if (status.lockBot.failedBotIds.length === status.lockBot.totalBots) {
    status.lockBot.ok = false;
  }
  // 合并所有 bot 的历史占用记录
  const occupancyHistory = occupancyResults.flat();

  // 2. 更新当前时间槽 + 先用 Lock Bot 数据渲染
  nowIdx = calcNowIdx();
  if (seq !== loadSeq) return status;
  adaptAndRender(stateResults, null, status, occupancyHistory, { phase: 'lockbot' });
  renderStatusBar(status);

  // 3. 先拉整机级 XPU 平均利用率，快速补齐主列表
  try {
    const nodeMonqueryData = await fetchMonqueryNodeUtilization(start, end);
    if (seq !== loadSeq) return status;
    monqueryMergedData = mergeMonqueryData(monqueryMergedData, nodeMonqueryData);
    status.monquery.ok = true;
    status.monquery.phase = 'node';
    status.monquery.cardLoading = true;
    currentLoadPhase = 'node';
    adaptAndRender(stateResults, monqueryMergedData, status, occupancyHistory, { phase: 'node', cardLoading: true });
    renderStatusBar(status);
  } catch (err) {
    status.monquery.ok = false;
    status.monquery.errorMessage = err.message;
    console.error('Monquery node fetch failed:', err);
  }

  // 4. 卡级 XPU/显存分批补齐，批次到达即渲染
  if (status.monquery.ok) {
    try {
      for await (const batch of fetchMonqueryCardUtilizationBatches(start, end, { batchSize: 8 })) {
        if (seq !== loadSeq) return status;
        monqueryMergedData = mergeMonqueryData(monqueryMergedData, batch.data);
        status.monquery.phase = 'cards';
        status.monquery.cardLoading = true;
        currentLoadPhase = 'cards';
        adaptAndRender(stateResults, monqueryMergedData, status, occupancyHistory, { phase: 'cards', cardLoading: true });
        renderStatusBar(status);
      }
      if (seq !== loadSeq) return status;
      status.monquery.phase = 'complete';
      status.monquery.cardLoading = false;
      currentLoadPhase = 'complete';
      adaptAndRender(stateResults, monqueryMergedData, status, occupancyHistory, { phase: 'complete', cardLoading: false });
    } catch (err) {
      status.monquery.ok = false;
      status.monquery.errorMessage = err.message;
      status.monquery.cardLoading = false;
      console.error('Monquery card fetch failed:', err);
      renderStatusBar(status);
    }
  }

  status.lastUpdated = Date.now();
  renderStatusBar(status);

  // 5. 错误覆盖层逻辑：双 API 均失败时计数，连续 3 次以上且有存量数据则弹出
  const bothFailed = !status.lockBot.ok && !status.monquery.ok;
  if (bothFailed) {
    consecutiveFailures++;
  } else {
    if (consecutiveFailures > 0) {
      consecutiveFailures = 0;
      hideErrorOverlay();
    }
    lastSuccessTime = Date.now();
  }

  if (consecutiveFailures >= 3 && nodes.length > 0) {
    showErrorOverlay(status);
  }

  return status;
}

/**
 * 合并 Lock Bot 状态 + 可选 Monquery 数据，适配后渲染
 * @param {Array}  stateResults  - Promise.all 返回的 bot 状态数组
 * @param {Array|null} monqueryData - Monquery 数据（null 表示还没拿到）
 * @param {object} status - ApiStatus 对象（in/out）
 */
function adaptAndRender(stateResults, monqueryData, status, occupancyHistory = [], options = {}) {
  currentLoadPhase = options.phase || currentLoadPhase;
  // 合并：同一节点出现在多个 bot 中时，先到先得
  const mergedState = {};
  const nodeBotTypes = {};
  for (const result of stateResults) {
    if (!result) continue;
    for (const [nodeName, nodeData] of Object.entries(result.state)) {
      if (!mergedState[nodeName]) {
        mergedState[nodeName] = nodeData;
        nodeBotTypes[nodeName] = result.botType;
      }
    }
  }

  const deviceState = {}, nodeState = {};
  for (const [name, data] of Object.entries(mergedState)) {
    if (nodeBotTypes[name] === 'DEVICE') deviceState[name] = data;
    else nodeState[name] = data;
  }

  let allNodes = [];
  if (Object.keys(deviceState).length) {
    allNodes.push(...adaptNodeData(deviceState, monqueryData, nowIdx, 'DEVICE', occupancyHistory));
  }
  if (Object.keys(nodeState).length) {
    allNodes.push(...adaptNodeData(nodeState, monqueryData, nowIdx, 'NODE', occupancyHistory));
  }

  if (allNodes.length > 0) {
    nodes = allNodes.sort((a, b) => {
      const parse = name => {
        if (name.startsWith('bdc')) return { prefix: 'bdc', id: parseInt(name.slice(3), 10) };
        return { prefix: 'node', id: parseInt(name.slice(4), 10) };
      };
      const va = parse(a.name), vb = parse(b.name);
      if (va.prefix !== vb.prefix) return va.prefix === 'node' ? -1 : 1;
      return va.id - vb.id;
    });
  }

  for (const node of nodes) {
    status.nodeDataQuality[node.name] = node.hasMonqueryData;
  }

  renderStats();
  renderList();
}

document.getElementById('login-btn').addEventListener('click', handleLogin);
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ---- 页面内刷新（刷新按钮动态渲染，用事件委托） ----
document.addEventListener('click', async (e) => {
  const btn = e.target.closest('#status-refresh-btn');
  if (!btn) return;
  e.preventDefault();
  btn.textContent = '↻ 刷新中…';
  btn.disabled = true;
  try {
    if (viewType === 'all') {
      await avgLoadAndRender();
    } else {
      const status = await loadAllData();
      renderStatusBar(status);
    }
  } catch (err) { /* loadAllData 内部已处理 */ }
});

// ---- 退出登录 ----
// ---- 利用率卡片 tooltip 切换 ----
document.addEventListener('click', e => {
  const icon = e.target.closest('.tip-icon');
  if (icon) {
    const popup = icon.parentElement.querySelector('.tip-popup');
    if (!popup) return;
    const wasOpen = popup.classList.contains('show');
    document.querySelectorAll('.tip-popup.show').forEach(p => p.classList.remove('show'));
    if (!wasOpen) popup.classList.add('show');
  } else {
    document.querySelectorAll('.tip-popup.show').forEach(p => p.classList.remove('show'));
  }
});

function doLogout() {
  hideErrorOverlay();
  consecutiveFailures = 0;
  clearSession();
  loadSeq++;
  token = null;
  monqueryMergedData = [];
  currentLoadPhase = 'idle';
  nodes = [];
  avgTodayNodes = []; avgYestNodes = [];
  avgTodayXpuMA = []; avgTodayMemMA = [];
  avgYestXpuMA = null; avgYestMemMA = null;
  avgHoverBound = { 'avg-xpu-chart': false, 'avg-mem-chart': false };
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  if (avgRefreshTimer) { clearInterval(avgRefreshTimer); avgRefreshTimer = null; }
  if (nowLineTimer) { clearInterval(nowLineTimer); nowLineTimer = null; }
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-form').style.display = '';
  const mini = document.getElementById('status-mini'); if (mini) mini.innerHTML = '';
}

// 错误覆盖层按钮
document.getElementById('error-retry-btn').addEventListener('click', () => {
  hideErrorOverlay();
  consecutiveFailures = 0;
  if (viewType === 'all') {
    avgLoadAndRender();
  } else {
    loadAllData().then(status => renderStatusBar(status));
  }
});
document.getElementById('error-logout-btn').addEventListener('click', doLogout);

// ---- 页面加载时自动登录 ----
(async function autoLogin() {
  const saved = restoreSession();
  if (saved && saved.token) {
    console.log('Restoring session…');
    try {
      token = saved.token;
      const bots = await fetchLockBotList(token);
      if (bots && bots.length) {
        allBots = bots;
        document.getElementById('loading-msg').remove();
        const status = await loadAllData();
        renderStatusBar(status);
        startAutoRefresh();
        startNowLineTimer();
        return;
      }
    } catch (e) { console.error('Session restore failed:', e); }
    clearSession();
    token = null;
  }

  // 无有效 session → 自动用默认账号登录
  console.log('Auto-login with default account…');
  try {
    token = await loginLockBot('admin', 'admin123');
    const bots = await fetchLockBotList(token);

function renderStats() {
  const effectiveIdx = Math.max(0, nowIdx - 1);

  // --- XPU/显存平均利用率（10:00 → 当前，仅 node 系列，排除 bdc） ---
  const SLOT_10AM = 120;
  let avgXpuStr = '--', avgMemStr = '--';
  if (effectiveIdx >= SLOT_10AM) {
    let xpuSum = 0, memSum = 0, xpuNodeCount = 0, memNodeCount = 0;
    const slotCount = effectiveIdx - SLOT_10AM + 1;
    for (const node of nodes) {
      if (node.hasNodeMonqueryData) {
        let nodeXpu = 0;
        for (let i = SLOT_10AM; i <= effectiveIdx; i++) nodeXpu += node.avgUtil[i];
        xpuSum += nodeXpu / slotCount;
        xpuNodeCount++;
      }
      if (node.hasMemMonqueryData) {
        let nodeMem = 0;
        for (let i = SLOT_10AM; i <= effectiveIdx; i++) nodeMem += node.avgMemUtil[i];
        memSum += nodeMem / slotCount;
        memNodeCount++;
      }
    }
    if (xpuNodeCount > 0) avgXpuStr = (xpuSum / xpuNodeCount).toFixed(1) + '%';
    if (memNodeCount > 0) avgMemStr = (memSum / memNodeCount).toFixed(1) + '%';
  }

  let busyNodes = 0, freeNodes = 0, busyCards = 0, freeCards = 0;
  let lockedNodes = 0, lockedCards = 0;
  for (const node of nodes) {
    if (node.status === 'FREE') freeNodes++;
    else busyNodes++;
    if (node.hasActiveLock) lockedNodes++;
    for (let c = 0; c < 8; c++) {
      if (node.hasCardMonqueryData) {
        const memUtil = (node.cardMemUtils && node.cardMemUtils[c]) ? node.cardMemUtils[c][effectiveIdx] : 0;
        const util = (node.cardUtils && node.cardUtils[c]) ? node.cardUtils[c][effectiveIdx] : 0;
        if (memUtil >= 10 || util >= 10) busyCards++; else freeCards++;
      } else if (!node.hasMonqueryData) {
        // bdc 等无 Monquery 数据的节点，按 Lock Bot 锁判定
        if (node.hasActiveLock) busyCards++; else freeCards++;
      }
      if (node.cardHasActiveLock && node.cardHasActiveLock[c]) lockedCards++;
    }
  }
  const totalCards = nodes.length * 8;

  // 第一行：总节点、总卡数、XPU平均利用率、显存平均利用率
  document.getElementById('stats-row-1').innerHTML =
    '<div class="stat-card total"><div class="label">总节点</div><div class="value total">' + nodes.length + '</div></div>' +
    '<div class="stat-card total"><div class="label">总卡数</div><div class="value total">' + totalCards + '</div></div>' +
    '<div class="stat-card xpu-avg"><div class="label">XPU平均利用率</div><div class="value xpu-avg pct">' + avgXpuStr + '</div><span class="tip-icon">?</span><div class="tip-popup">当日10:00至当前时刻，所有node节点XPU的平均利用率</div></div>' +
    '<div class="stat-card mem-avg"><div class="label">显存平均利用率</div><div class="value mem-avg pct">' + avgMemStr + '</div><span class="tip-icon">?</span><div class="tip-popup">当日10:00至当前时刻，所有node节点显存的平均利用率</div></div>';

  // 第二行：LOCKED节点、BUSY节点、LOCKED卡数、BUSY卡数
  document.getElementById('stats-row-2').innerHTML =
    '<div class="stat-card locked"><div class="label">LOCKED 节点</div><div class="value locked">' + lockedNodes + '</div></div>' +
    '<div class="stat-card busy"><div class="label">BUSY节点</div><div class="value busy">' + busyNodes + '</div></div>' +
    '<div class="stat-card locked"><div class="label">LOCKED 卡数</div><div class="value locked">' + lockedCards + '</div></div>' +
    '<div class="stat-card busy"><div class="label">BUSY卡数</div><div class="value busy">' + busyCards + '</div></div>';
}

// ---- Average View: Chart Drawing ----

/**
 * 按 window.devicePixelRatio 提升 canvas backing store 分辨率，
 * 同时应用 setTransform(dpr,0,0,dpr,0,0)。返回值仍是 CSS 单位的宽高，
 * 这样下游所有基于 AVG_MARGIN 等常量计算的几何参数无须改写即可正常工作。
 */
function avgSetupHiDPI(canvas, wrap) {
  const dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
  const w = wrap.clientWidth  || wrap.offsetWidth  || 600;
  const h = wrap.clientHeight || wrap.offsetHeight || 310;
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w, h };
}

/**
 * 计算 arr[i], i ∈ [0..end] 的算术平均值。
 * 区间总和 < 极小阈值视为无有效样本返回 null，
 * 调用方据此决定是否绘制对应平均水平线。
 */
function _meanSlotOf(arr, endInclusive) {
  if (!arr) return null;
  const n = Math.min(endInclusive + 1, SLOT_COUNT);
  if (n <= 0) return null;
  let s = 0;
  for (let i = 0; i < n; i++) {
    const v = Number(arr[i]);
    if (!isNaN(v)) s += v;
  }
  return s < 1e-6 ? null : s / n;
}

function _peakSlotOf(arr, endInclusive) {
  if (!arr) return null;
  const n = Math.min(endInclusive + 1, SLOT_COUNT);
  if (n <= 0) return null;
  let peak = null;
  for (let i = 0; i < n; i++) {
    const v = Number(arr[i]);
    if (!Number.isFinite(v)) continue;
    if (!peak || v > peak.value) peak = { slot: i, value: v };
  }
  return peak && peak.value >= 1e-6 ? peak : null;
}

function avgDrawChart(canvasId, todayData, yestData, color, ghostColor, yMax, yTicks, cutoffSlot, todayAvgColor, yestAvgColor) {
  const canvas = document.getElementById(canvasId);
  const wrap = canvas.parentElement;
  const { w, h } = avgSetupHiDPI(canvas, wrap);
  const ctx = canvas.getContext('2d');

  const plotW = w - AVG_MARGIN.left - AVG_MARGIN.right;
  const plotH = h - AVG_MARGIN.top - AVG_MARGIN.bottom;
  const maxSlot = Math.min(SLOT_COUNT - 1, cutoffSlot);

  // Grid lines
  ctx.save();
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = .8;
  ctx.setLineDash([4, 4]);
  yTicks.forEach(v => {
    const y = AVG_MARGIN.top + (1 - v / yMax) * plotH;
    ctx.beginPath(); ctx.moveTo(AVG_MARGIN.left, y); ctx.lineTo(w - AVG_MARGIN.right, y); ctx.stroke();
  });
  for (let i = 0; i <= SLOT_COUNT; i += 24) {
    const x = AVG_MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
    ctx.beginPath(); ctx.moveTo(x, AVG_MARGIN.top); ctx.lineTo(x, AVG_MARGIN.top + plotH); ctx.stroke();
  }
  ctx.setLineDash([]); ctx.restore();

  // Y axis
  ctx.save();
  ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(AVG_MARGIN.left, AVG_MARGIN.top); ctx.lineTo(AVG_MARGIN.left, AVG_MARGIN.top + plotH); ctx.stroke();
  ctx.restore();

  // X axis
  ctx.save();
  ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(AVG_MARGIN.left, AVG_MARGIN.top + plotH); ctx.lineTo(w - AVG_MARGIN.right, AVG_MARGIN.top + plotH); ctx.stroke();
  ctx.restore();

  // X axis labels
  ctx.save();
  ctx.fillStyle = '#000000';
  ctx.font = '11px "SF Mono","JetBrains Mono",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let i = 0; i < SLOT_COUNT; i += 24) {
    const x = AVG_MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
    const hh = Math.floor(i / 12), mm = i % 12 * 5;
    ctx.fillText(String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0'), x, AVG_MARGIN.top + plotH + 5);
  }
  ctx.restore();

  // Y axis labels
  ctx.save();
  yTicks.forEach(v => {
    const y = AVG_MARGIN.top + (1 - v / yMax) * plotH;
    const isExtreme = (v === 0 || v === yMax);
    ctx.fillStyle = '#000000';
    ctx.font = (isExtreme ? 'bold ' : '') + '11px "SF Mono","JetBrains Mono",monospace';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(v + '%', AVG_MARGIN.left - 7, y);
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(AVG_MARGIN.left - 4, y); ctx.lineTo(AVG_MARGIN.left, y); ctx.stroke();
  });
  ctx.restore();

  // Clip region
  ctx.save();
  ctx.beginPath(); ctx.rect(AVG_MARGIN.left, AVG_MARGIN.top, plotW, plotH); ctx.clip();

  // Yesterday line (dashed, full day)
  if (yestData) {
    ctx.strokeStyle = ghostColor; ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    for (let i = 0; i < SLOT_COUNT; i++) {
      const x = AVG_MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
      const v = Math.max(0, Math.min(yMax, yestData[i]));
      const y = AVG_MARGIN.top + (1 - v / yMax) * plotH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Today line (solid, up to maxSlot)
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= maxSlot; i++) {
    const x = AVG_MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
    const v = Math.max(0, Math.min(yMax, todayData[i]));
    const y = AVG_MARGIN.top + (1 - v / yMax) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // ---- 平均参考线与峰值标注（仍在 clip 保护内，早于快照捕获） ----
  const todayMean = _meanSlotOf(todayData, cutoffSlot);
  const yestMean  = yestData ? _meanSlotOf(yestData, SLOT_COUNT - 1) : null;
  const todayPeak = _peakSlotOf(todayData, maxSlot);
  const yestPeak  = yestData ? _peakSlotOf(yestData, SLOT_COUNT - 1) : null;
  const _drawAvgLine = (val, strokeStyle, labelText, dashed) => {
    if (val == null || val < 0 || val > yMax * 1.05) return;
    const yy = AVG_MARGIN.top + Math.min(plotH, (1 - val / yMax) * plotH);
    const x1 = AVG_MARGIN.left;
    const x2 = w - AVG_MARGIN.right;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = 1.4;
    ctx.setLineDash(dashed ? [6, 5] : []);
    ctx.beginPath();
    ctx.moveTo(x1, yy);
    ctx.lineTo(x2, yy);
    ctx.stroke();
    // 紧贴右轴内侧标注数值，与水平线同色直接关联无需图例查找
    if (labelText) {
      ctx.setLineDash([]);
      ctx.fillStyle = strokeStyle;
      ctx.font = '700 10px "SF Mono","JetBrains Mono",monospace';
      ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
      // 轻微背景描边防止压在主曲线上时不可读
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.strokeText(labelText, x2 - 4, yy - 2);
      ctx.fillText(labelText, x2 - 4, yy - 2);
    }
    ctx.restore();
  };
  _drawAvgLine(todayMean, todayAvgColor, null, false);
  if (yestMean != null)
    _drawAvgLine(yestMean, yestAvgColor, null, true);

  const _drawPeak = (peak, peakColor, labelOffset) => {
    if (!peak) return;
    const clampedValue = Math.max(0, Math.min(yMax, peak.value));
    const px = AVG_MARGIN.left + (peak.slot / (SLOT_COUNT - 1)) * plotW;
    const py = AVG_MARGIN.top + (1 - clampedValue / yMax) * plotH;
    const nearTop = py < AVG_MARGIN.top + 16;
    const textY = py + (nearTop ? 18 : -10) + labelOffset;
    const textX = Math.max(AVG_MARGIN.left + 22, Math.min(w - AVG_MARGIN.right - 22, px));
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = peakColor;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = peakColor;
    ctx.font = '700 10px "SF Mono","JetBrains Mono",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255,255,255,0.88)';
    const text = peak.value.toFixed(1) + '%';
    ctx.strokeText(text, textX, textY);
    ctx.fillStyle = peakColor;
    ctx.fillText(text, textX, textY);
    ctx.restore();
  };
  const closePeaks = todayPeak && yestPeak &&
    Math.abs(todayPeak.slot - yestPeak.slot) < 8 &&
    Math.abs(todayPeak.value - yestPeak.value) < yMax * 0.08;
  _drawPeak(yestPeak, ghostColor, closePeaks ? 12 : 0);
  _drawPeak(todayPeak, color, 0);

  // 把均值和峰值挂到 canvas 元素上供后续 hover tooltip 扩展使用
  canvas._avgtodayMean = todayMean;
  canvas._avgyestMean  = yestMean;
  canvas._avgtodayPeak = todayPeak;
  canvas._avgyestPeak  = yestPeak;

  ctx.restore();

  // ---- 图例（坐标轴区域左上角） ----
  const lx = AVG_MARGIN.left + 8, ly = AVG_MARGIN.top + 6;
  const items = [
    { color, dash: false, label: '今日' },
    { color: todayAvgColor, dash: false, label: '今日均值' }
  ];
  if (yestData) {
    items.push({ color: ghostColor, dash: true, label: '昨日' });
    items.push({ color: yestAvgColor, dash: true, label: '昨日均值' });
  }
  const lw = yestData ? 104 : 78, lh = 12 + items.length * 14;
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.beginPath(); ctx.roundRect(lx, ly, lw, lh, 4); ctx.fill();
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = .5;
  ctx.beginPath(); ctx.roundRect(lx, ly, lw, lh, 4); ctx.stroke();
  items.forEach((it, i) => {
    const iy = ly + 6 + i * 14;
    ctx.strokeStyle = it.color; ctx.lineWidth = it.label.includes('均值') ? 1.4 : 2;
    ctx.setLineDash(it.dash ? [4, 3] : []);
    ctx.beginPath(); ctx.moveTo(lx + 6, iy + 4); ctx.lineTo(lx + 26, iy + 4); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#475569'; ctx.font = '10px -apple-system,"PingFang SC",sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(it.label, lx + 30, iy + 4);
  });

  // Store metadata for hover
  const layers = [{ data: todayData, color, label: '今日' }];
  if (yestData) layers.push({ data: yestData, color: ghostColor, tipColor: color, label: '昨日' });
  canvas._avglayers = layers;
  canvas._avgmargins = AVG_MARGIN;
  canvas._avgplotW = plotW;
  canvas._avgplotH = plotH;
  canvas._avgyMax = yMax;

  // Snapshot
  const img = new Image(); img.src = canvas.toDataURL(); canvas._avgsnapshot = img;
}

function avgDrawAllCharts() {
  if (!avgTodayXpuMA.length) return;
  avgDrawChart('avg-xpu-chart', avgTodayXpuMA, avgYestXpuMA,
               '#7c3aed', 'rgba(124,58,237,0.45)', 35, XPU_TICKS, avgCutoffSlot,
               '#dc2626', '#dc2626');
  avgDrawChart('avg-mem-chart', avgTodayMemMA, avgYestMemMA,
               '#ea580c', 'rgba(234,88,12,0.45)', 70, MEM_TICKS, avgCutoffSlot,
               '#dc2626', '#dc2626');
}

function avgRestoreSnapshot(canvas) {
  if (!canvas._avgsnapshot) return;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);            // 临时切回原始物理像素模式
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(canvas._avgsnapshot, 0, 0);      // 快照天然等于 backing store 大小正好铺满
  ctx.restore();                                  // 还原之前活动的 scale(dpr,dpr) 给上层调用方续用
}

let avgHoverBound = { 'avg-xpu-chart': false, 'avg-mem-chart': false };

function avgBindHover(canvasId) {
  if (avgHoverBound[canvasId]) return;
  avgHoverBound[canvasId] = true;
  const canvas = document.getElementById(canvasId);
  canvas.addEventListener('mousemove', e => {
    const layers = canvas._avglayers; if (!layers || !layers.length) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const m = canvas._avgmargins, pw = canvas._avgplotW, ph = canvas._avgplotH;
    if (!m) return;
    const plotX = x - m.left;
    const ci = Math.max(0, Math.min(SLOT_COUNT - 1, Math.round(plotX / pw * (SLOT_COUNT - 1))));
    if (plotX < 0 || plotX > pw) { tooltip.style.display = 'none'; avgRestoreSnapshot(canvas); return; }

    avgRestoreSnapshot(canvas);
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.beginPath(); ctx.rect(m.left, m.top, pw, ph); ctx.clip();
    // Crosshair
    const cx = m.left + (ci / (SLOT_COUNT - 1)) * pw;
    ctx.strokeStyle = 'rgba(100,116,139,0.5)'; ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, m.top); ctx.lineTo(cx, m.top + ph); ctx.stroke();
    ctx.setLineDash([]);
    // Dots
    const yMax = canvas._avgyMax || 100;
    layers.forEach(l => {
      const v = l.data[ci], dotX = cx, dotY = m.top + (1 - v / yMax) * ph;
      ctx.beginPath(); ctx.arc(dotX, dotY, 4, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = l.color; ctx.lineWidth = 2; ctx.stroke();
    });
    ctx.restore();

    const hh = Math.floor(ci / 12), mm = (ci % 12) * 5;
    const timeStr = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    let html = `<div style="font-size:10px;color:#94a3b8;margin-bottom:4px;">${timeStr}</div>`;
    layers.forEach(l => {
      const tc = l.tipColor || l.color;
      html += `<div style="display:grid;grid-template-columns:12px 48px 48px;align-items:center;gap:6px;margin:1px 0;"><span style="width:7px;height:7px;border-radius:50%;background:${tc};justify-self:center;"></span><span style="font-size:10px;color:#cbd5e1;">${l.label}</span><span style="font-weight:600;color:${tc};text-align:right;font-variant-numeric:tabular-nums;">${l.data[ci].toFixed(1)}%</span></div>`;
    });
    const avgRows = [
      { label: '今日均值', value: canvas._avgtodayMean, dash: false },
      { label: '昨日均值', value: canvas._avgyestMean, dash: true }
    ].filter(row => row.value != null);
    avgRows.forEach(row => {
      const line = row.dash
        ? 'repeating-linear-gradient(90deg,#dc2626 0,#dc2626 5px,transparent 5px,transparent 9px)'
        : '#dc2626';
      html += `<div style="display:grid;grid-template-columns:12px 48px 48px;align-items:center;gap:6px;margin:1px 0;"><span style="width:12px;height:2px;background:${line};justify-self:center;"></span><span style="font-size:10px;color:#cbd5e1;">${row.label}</span><span style="font-weight:600;color:#dc2626;text-align:right;font-variant-numeric:tabular-nums;">${row.value.toFixed(1)}%</span></div>`;
    });
    const peakRows = [
      { label: '今日峰值', value: canvas._avgtodayPeak, color: layers[0]?.color || '#7c3aed' },
      { label: '昨日峰值', value: canvas._avgyestPeak, color: layers[1]?.tipColor || layers[0]?.color || '#7c3aed' }
    ].filter(row => row.value != null);
    peakRows.forEach(row => {
      html += `<div style="display:grid;grid-template-columns:12px 48px 48px;align-items:center;gap:6px;margin:1px 0;"><span style="width:7px;height:7px;border-radius:50%;border:2px solid ${row.color};background:#fff;justify-self:center;box-sizing:border-box;"></span><span style="font-size:10px;color:#cbd5e1;">${row.label}</span><span style="font-weight:600;color:${row.color};text-align:right;font-variant-numeric:tabular-nums;">${row.value.value.toFixed(1)}%</span></div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(rect.left + cx + 14, rect.right - tooltip.offsetWidth - 6) + 'px';
    tooltip.style.top = Math.max(rect.top, rect.top + m.top + ph * 0.15) + 'px';
  });
  canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; avgRestoreSnapshot(canvas); });
}

// ---- Average View: Data Loading ----

async function avgLoadAndRender() {
  const selDate = avgGetSelectedDate();
  const isToday = document.getElementById('avg-filter-date').value === avgGetTodayStr();

  const todayStart = formatDateStart(selDate);
  const todayEnd = isToday ? formatDateTime(new Date()) : formatDateEnd(selDate);

  const yesterday = new Date(selDate); yesterday.setDate(yesterday.getDate() - 1);
  const yestStart = formatDateStart(yesterday), yestEnd = formatDateEnd(yesterday);

  const [todayData, yestData] = await Promise.all([
    fetchMonqueryUtilization(todayStart, todayEnd).catch(e => { console.error('Avg fetch failed:', e); return null; }),
    fetchMonqueryUtilization(yestStart, yestEnd).catch(e => { console.warn('Avg yesterday fetch failed:', e); return null; })
  ]);

  avgTodayNodes = processMonqueryData(todayData);
  avgYestNodes = processMonqueryData(yestData);

  const td = computeMA(avgTodayNodes, avgWindow);
  avgTodayXpuMA = td.xpu; avgTodayMemMA = td.mem;

  if (avgYestNodes.length) {
    const yd = computeMA(avgYestNodes, avgWindow);
    avgYestXpuMA = yd.xpu; avgYestMemMA = yd.mem;
  } else {
    avgYestXpuMA = null; avgYestMemMA = null;
  }

  if (isToday) {
    const now = new Date();
    avgCutoffSlot = Math.max(0, now.getHours() * 12 + Math.floor(now.getMinutes() / 5) - 1);
  } else {
    avgCutoffSlot = 287;
  }

  renderStatusBar({ lockBot: { ok: true }, monquery: { ok: !!todayData }, lastUpdated: Date.now() });
  avgDrawAllCharts();
}

function avgStartAutoRefresh() {
  if (avgRefreshTimer) clearInterval(avgRefreshTimer);
  avgRefreshTimer = setInterval(async () => {
    if (document.hidden) return;
    if (viewType !== 'all') return;
    if (document.getElementById('avg-filter-date').value !== avgGetTodayStr()) return;
    try { await avgLoadAndRender(); } catch(e) { console.error('Avg auto-refresh:', e); }
  }, 60000);
}

function showToast(message, duration = 5000) {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration);
}

// ---- 错误覆盖层 ----

function showErrorOverlay(status) {
  const overlay = document.getElementById('error-overlay');
  const detail = document.getElementById('error-detail');
  const meta = document.getElementById('error-meta');

  let detailText = '';
  if (!status.lockBot.ok && !status.monquery.ok) {
    detailText = 'Lock Bot 和监控数据均无法获取<br>请检查网络连接或联系管理员';
  } else if (!status.lockBot.ok) {
    detailText = '所有 Lock Bot 离线<br>占用数据不可用';
  } else if (!status.monquery.ok) {
    detailText = '监控数据获取失败<br>利用率数据暂不可用';
  }

  const parts = [];
  if (lastSuccessTime) {
    parts.push(`上次成功：${new Date(lastSuccessTime).toLocaleTimeString('zh-CN')}`);
  }
  parts.push(`连续失败 ${consecutiveFailures} 次`);
  meta.textContent = parts.join(' · ');

  detail.innerHTML = detailText;
  overlay.classList.remove('hidden');
}

function hideErrorOverlay() {
  document.getElementById('error-overlay').classList.add('hidden');
}

// ---- 过滤与排序 ----

document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.status !== undefined) {
      // 状态筛选按钮
      document.querySelectorAll('.status-btn[data-status]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStatus = btn.dataset.status;
      renderList();
    } else if (btn.dataset.sort !== undefined) {
      // 排序按钮
      if (activeSort === btn.dataset.sort) {
        activeSort = '';
        btn.classList.remove('active');
      } else {
        activeSort = btn.dataset.sort;
        document.querySelectorAll('.status-btn[data-sort]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      renderList();
    }
  });
});

document.getElementById('search').addEventListener('input', renderList);

// NODE 节点展开/收起事件委托
document.getElementById('node-list').addEventListener('click', e => {
  const toggle = e.target.closest('.expand-toggle');
  if (!toggle) return;
  const nodeName = toggle.dataset.node;
  if (expandedNodes.has(nodeName)) {
    expandedNodes.delete(nodeName);
  } else {
    expandedNodes.add(nodeName);
  }
  const scrollY = window.scrollY;
  renderList();
  window.scrollTo({ top: scrollY, behavior: 'instant' });
});

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  let f = nodes.filter(n => {
    if (activeType !== 'ALL' && n.botType !== activeType) return false;
    if (activeStatus !== 'ALL' && n.status !== activeStatus) return false;
    if (q && !n.name.includes(q)) return false;
    return true;
  });
  if (activeSort === 'util-desc') f.sort((a, b) => b.currentUtil - a.currentUtil);
  else if (activeSort === 'mem-desc') f.sort((a, b) => (b.avgMemUtil[nowIdx] || 0) - (a.avgMemUtil[nowIdx] || 0));
  return f;
}

function utilClass(val, hasData) {
  if (!hasData) return 'nodata';
  if (val >= 50) return 'high';
  if (val >= 20) return 'mid';
  return 'low';
}

// ---- 节点列表渲染 ----

function fmtSlotTime(slotIdx) {
  const h = Math.floor(slotIdx / 12);
  const m = (slotIdx % 12) * 5;
  return `${h}:${String(m).padStart(2, '0')}`;
}

function makeOccupyBlocks(occs) {
  return occs.map(o => {
    const left = (o.start / SLOT_COUNT * 100).toFixed(2);
    const width = ((o.end - o.start) / SLOT_COUNT * 100).toFixed(2);
    const user = o.user || '';
    return `<div class="occupy-block" style="left:${left}%;width:${width}%" data-user="${user}" data-start="${o.start}" data-end="${o.end}"><span class="occupy-user">${user}</span></div>`;
  }).join('');
}

function renderList() {
  const container = document.getElementById('node-list');
  container.innerHTML = '';
  const filtered = getFiltered();
  filtered.forEach(node => {
    const row = document.createElement('div');
    const showBadge = node.hasMonqueryData !== false
      ? `<span class="badge badge-${node.status}">${node.status}</span>`
      : `<span class="badge badge-NODATA">无数据</span>`;
    const hasData = node.hasMonqueryData !== false;
    const hasNodeData = node.hasNodeMonqueryData || hasData;
    const showUtil = hasNodeData
      ? `<span class="util-value ${utilClass(node.currentUtil, true)}">${node.currentUtil.toFixed(2)}%</span>`
      : `<span class="util-value nodata">--</span>`;
    const memShow = node.hasMemMonqueryData
      ? `<span class="util-value ${utilClass(node.currentMemUtil || 0, true)}">${(node.currentMemUtil || 0).toFixed(2)}%</span>`
      : `<span class="util-value nodata">${hasData ? '加载中' : '--'}</span>`;

    // 异常标记：僵尸锁检测
    let warnBadge = '';
    if (hasData && node.hasActiveLock) {
      // 检查最近 2h（24 个 5min 槽）是否持续空闲
      const windowSlots = 24;
      const endSlot = Math.max(0, nowIdx - 1);
      const startSlot = Math.max(0, endSlot - windowSlots + 1);
      let unused2h = true;
      for (let s = startSlot; s <= endSlot; s++) {
        const avgU = node.avgUtil[s] || 0;
        const avgM = node.avgMemUtil[s] || 0;
        if (avgU >= 10 || avgM >= 10) {
          unused2h = false;
          break;
        }
      }
      if (unused2h) {
        warnBadge = '<span class="badge-warn-zombie" title="该节点已锁定但近2h内XPU与显存利用率均低于10%">⚠已锁定≥2h未使用</span>';
      }
    }

    row.className = 'node-row';
    const isExpanded = expandedNodes.has(node.name);
    const expandToggle = `<span class="expand-toggle" data-node="${node.name}">${isExpanded ? '收起' : '展开'}</span>`;
    row.innerHTML = `
      <div class="node-header">
        <span class="node-name">${node.name}</span><span class="type-tag type-tag-${node.botType}">${node.botType}</span>
        ${showBadge}${warnBadge}
        <span class="node-stats">XPU ${showUtil} <span style="margin-left:8px;">显存 ${memShow}</span></span>${expandToggle}
      </div>
      <div class="timeline-container">
        ${makeOccupyBlocks(node.occupations)}
        <canvas class="util-line" width="600" height="40"></canvas>
      </div>
      <div class="time-labels"><span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>
    `;
    container.appendChild(row);
    drawUtilLine(row.querySelector('.timeline-container canvas'), node.avgUtil, '#4f46e5');
    if (node.hasMemMonqueryData) {
      drawUtilLine(row.querySelector('.timeline-container canvas'), node.avgMemUtil, '#ea580c', true);
    }
    captureLayerSnapshot(row.querySelector('.timeline-container canvas'));

    if (expandedNodes.has(node.name)) {
      if (node.hasMonqueryData && !node.hasCardMonqueryData) {
        const loadingRow = document.createElement('div');
        loadingRow.className = 'card-loading';
        loadingRow.textContent = '卡级数据加载中…';
        container.appendChild(loadingRow);
        return;
      }
      for (let c = 0; c < 8; c++) {
        const cardRow = document.createElement('div');
        cardRow.className = 'card-row';
        const effectiveIdx = Math.max(0, nowIdx - 1);
        const cu = (node.cardUtils && node.cardUtils[c]) ? node.cardUtils[c][effectiveIdx] : 0;
        const cm = (node.cardMemUtils && node.cardMemUtils[c]) ? node.cardMemUtils[c][effectiveIdx] : 0;
        const cardBusy = node.hasCardMonqueryData
          ? (cm >= 10 || cu >= 10)
          : (node.cardHasActiveLock && node.cardHasActiveLock[c]);
        const lockMark = (node.cardOccupations && node.cardOccupations[c] && node.cardOccupations[c].length)
          ? `<span class="card-lock" title="有 Lock Bot 锁记录">🔒</span>` : '';
        cardRow.innerHTML = `
          <span class="card-name">XPU #${c}</span>
          <span class="badge badge-${cardBusy ? 'BUSY' : 'FREE'}" style="font-size:10px;padding:1px 5px;">${cardBusy ? '占用' : '空闲'}</span>
          <span class="card-val" style="color:#4f46e5">XPU ${cu.toFixed(1)}%</span>
          <span class="card-val" style="color:#ea580c">显存 ${cm.toFixed(1)}%</span>
          ${lockMark}
        `;
        container.appendChild(cardRow);

        // 卡片级折线图
        const cardTimeline = document.createElement('div');
        cardTimeline.className = 'card-timeline';
        const cardOccs = (node.cardOccupations && node.cardOccupations[c]) || [];
        const cardUtil = (node.cardUtils && node.cardUtils[c]) || new Array(SLOT_COUNT).fill(0);
        const cardMem = (node.cardMemUtils && node.cardMemUtils[c]) || new Array(SLOT_COUNT).fill(0);
        cardTimeline.innerHTML = `
          <div class="timeline-container">
            ${makeOccupyBlocks(cardOccs)}
            <canvas class="util-line" width="400" height="24"></canvas>
          </div>
        `;
        container.appendChild(cardTimeline);
        const cardCanvas = cardTimeline.querySelector('canvas');
        drawUtilLine(cardCanvas, cardUtil, '#4f46e5');
        if (node.hasMemMonqueryData) {
          drawUtilLine(cardCanvas, cardMem, '#ea580c', true);
        }
        captureLayerSnapshot(cardCanvas);
      }
    }
  });
  bindTooltips();
  bindCanvasHover();
  addGlobalNowLine(container);
}

function addGlobalNowLine(container) {
  const firstTimeline = container.querySelector('.timeline-container');
  if (!firstTimeline) return;
  const containerRect = container.getBoundingClientRect();
  const timelineRect = firstTimeline.getBoundingClientRect();
  const offsetLeft = timelineRect.left - containerRect.left;
  const timelineWidth = timelineRect.width;
  const lineLeft = offsetLeft + (nowIdx / SLOT_COUNT) * timelineWidth;
  const timeH = Math.floor(nowIdx / 12), timeM = (nowIdx % 12) * 5;
  const timeStr = `${timeH}:${String(timeM).padStart(2, '0')}`;
  const line = document.createElement('div');
  line.className = 'global-now-line';
  line.style.left = lineLeft + 'px';
  line.innerHTML = `<span class="global-now-label">${timeStr}</span>`;
  container.appendChild(line);
}

function bindCanvasHover() {
  bindTimelineCanvasHover(document.querySelectorAll('.util-line'), tooltip);
}

function bindTooltips() {
  document.querySelectorAll('.occupy-block').forEach(block => {
    block.addEventListener('mouseenter', ev => {
      const s = parseInt(block.dataset.start, 10), end = parseInt(block.dataset.end, 10);
      tooltip.textContent = `${block.dataset.user} (${fmtSlotTime(s)} - ${fmtSlotTime(end)})`;
      tooltip.style.display = 'block';
    });
    block.addEventListener('mousemove', e => {
      tooltip.style.left = e.pageX + 10 + 'px'; tooltip.style.top = e.pageY - 30 + 'px';
    });
    block.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}
</script>
