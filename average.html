<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集群利用率趋势 — 开发机集群</title>
<style>
:root {
  --bg:        #f4f5f7;
  --surface:   #ffffff;
  --border:    #e2e8f0;
  --text:      #1e293b;
  --muted:     #94a3b8;
  --xpu:       #7c3aed;
  --mem:       #ea580c;
  --xpu-ghost: rgba(124,58,237,0.30);
  --mem-ghost: rgba(234,88,12,0.30);
  --dot-ok:    #16a34a;
  --dot-warn:  #d97706;
  --dot-err:   #dc2626;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 24px 28px;
  min-height: 100vh;
  letter-spacing: -.01em;
}

/* ── Typography ── */
h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -.02em; }

/* ── Login ── */
.login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
.login-card {
  background: #fff; border-radius: 12px; padding: 32px 28px; width: 340px;
  box-shadow: 0 4px 24px rgba(0,0,0,.3);
}
.login-card h2 { font-size: 16px; margin-bottom: 20px; text-align: center; color: #64748b; }
.login-card input {
  width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 14px; margin-bottom: 12px; outline: none;
}
.login-card input:focus { border-color: var(--xpu); box-shadow: 0 0 0 3px rgba(167,139,250,.15); }
.login-card button {
  width: 100%; padding: 10px; background: var(--xpu); color: #fff; border: none;
  border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500;
}
.login-card button:hover { opacity: .9; }
.login-card button:disabled { opacity: .5; cursor: not-allowed; }
.login-error { color: var(--dot-err); font-size: 13px; margin-top: 10px; text-align: center; }

/* ── Header ── */
.header { margin-bottom: 16px; }
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.header-group { display: flex; align-items: center; gap: 14px; }
.back-link {
  font-size: 12px; color: var(--muted); text-decoration: none;
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
  transition: all .15s;
}
.back-link:hover { border-color: var(--xpu); color: var(--xpu); }

/* ── Window toggles ── */
.window-toggles { display: flex; gap: 2px; background: var(--surface); border-radius: 8px; padding: 3px; }
.win-btn {
  padding: 4px 14px; border: none; border-radius: 6px; font-size: 12px;
  cursor: pointer; background: transparent; color: var(--muted);
  font-weight: 500; font-family: "SF Mono", "JetBrains Mono", monospace;
  transition: all .15s;
}
.win-btn:hover { color: var(--text); }
.win-btn.active { background: var(--border); color: var(--text); }

/* ── Time range filter ── */
.header-filter {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  font-size: 12px; color: var(--muted); flex-wrap: wrap;
}
.header-filter label { font-weight: 500; }
.header-filter input[type="date"] {
  padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; font-family: "SF Mono", "JetBrains Mono", monospace;
  color: var(--text); background: var(--surface); outline: none;
  width: 120px;
}
.header-filter input[type="date"]:focus { border-color: var(--xpu); }

/* ── Status bar ── */
.status-bar {
  display: flex; align-items: center; gap: 8px; padding: 6px 14px; margin-bottom: 14px;
  border-radius: 8px; font-size: 12px; background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.15);
}
.status-bar.caution { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.15); }
.status-bar.error   { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.15); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dot-ok); flex-shrink: 0; }
.status-bar.caution .status-dot { background: var(--dot-warn); }
.status-bar.error   .status-dot { background: var(--dot-err); }
.status-tag {
  font-size: 10px; font-weight: 700; letter-spacing: .8px;
  padding: 2px 6px; border-radius: 3px;
  background: rgba(34,197,94,.12); color: var(--dot-ok);
}
.status-bar.caution .status-tag { background: rgba(245,158,11,.12); color: var(--dot-warn); }
.status-bar.error   .status-tag { background: rgba(239,68,68,.12); color: var(--dot-err); }
.status-node-count { color: var(--muted); font-size: 11px; }
.status-time {
  color: var(--muted); font-size: 11px; margin-left: auto;
  font-family: "SF Mono", "JetBrains Mono", monospace;
}

/* ── Charts row ── */
.charts-row {
  display: flex; flex-direction: column; gap: 16px;
}
.chart-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.chart-panel-title {
  font-size: 13px; font-weight: 600; margin-bottom: 4px;
  color: var(--text);
}

/* ── Chart legend ── */
.chart-legend {
  display: flex; align-items: center; gap: 16px; font-size: 11px; margin-bottom: 8px;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-line { height: 2px; border-radius: 1px; }
.legend-line.solid { width: 16px; }
.legend-line.dash  { width: 16px; border: none; background: repeating-linear-gradient(90deg, var(--c) 0, var(--c) 4px, transparent 4px, transparent 7px); }

/* ── Chart wrap ── */
.chart-wrap { position: relative; height: 310px; }
.chart-wrap canvas { width: 100%; height: 100%; }

/* ── Tooltip ── */
.tooltip {
  position: fixed; color: #fff; padding: 8px 12px;
  border-radius: 8px; font-size: 11px; pointer-events: none; white-space: nowrap;
  z-index: 200; display: none;
  font-family: "SF Mono", "JetBrains Mono", monospace;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
  background: #1e1f2a; border: 1px solid #374151;
}
.tooltip .t-time { font-size: 10px; color: #94a3b8; margin-bottom: 4px; }
.tooltip .t-row { display: flex; align-items: center; gap: 6px; margin: 1px 0; }
.tooltip .t-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tooltip .t-label { font-size: 10px; color: #cbd5e1; }
.tooltip .t-val { font-weight: 600; }

/* ── Loading ── */
#loading-msg { text-align: center; padding: 80px; color: var(--muted); font-size: 14px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  body { padding: 16px; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-form" class="login-container" style="display:none">
  <h1 style="text-align:center;margin-bottom:20px;color:#1e293b">开发机集群利用率趋势</h1>
  <div class="login-card">
    <h2>Lock Bot 登录</h2>
    <input id="login-username" type="text" placeholder="用户名" autocomplete="username">
    <input id="login-password" type="password" placeholder="密码" autocomplete="current-password">
    <button id="login-btn">登 录</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:block">
  <div class="header">
    <div class="header-top">
      <div class="header-group">
        <h1>集群利用率趋势</h1>
        <a href="/" class="back-link">← 仪表盘</a>
      </div>
      <div class="window-toggles" id="window-toggles">
        <span class="win-btn" data-window="1">5m</span>
        <span class="win-btn active" data-window="2">10m</span>
        <span class="win-btn" data-window="6">30m</span>
        <span class="win-btn" data-window="12">1h</span>
      </div>
    </div>
    <div class="header-filter" id="header-filter">
      <label>日期</label>
      <input type="date" id="filter-date">
    </div>
  </div>
  <div id="loading-msg">正在加载…</div>
  <div class="status-bar" id="status-bar" style="display:none"></div>

  <div class="charts-row" id="charts-row" style="display:none">
    <!-- XPU Chart -->
    <div class="chart-panel" id="xpu-panel">
      <div class="chart-panel-title">XPU 利用率</div>
      <div class="chart-legend">
        <div class="legend-item">
          <span class="legend-line solid" style="--c:var(--xpu);background:var(--xpu)"></span>
          <span>今日</span>
        </div>
        <div class="legend-item">
          <span class="legend-line dash" style="--c:var(--xpu-ghost)"></span>
          <span style="color:var(--muted)">昨日</span>
        </div>
      </div>
      <div class="chart-wrap" id="xpu-chart-wrap">
        <canvas id="xpu-chart"></canvas>
      </div>
    </div>

    <!-- MEM Chart -->
    <div class="chart-panel" id="mem-panel">
      <div class="chart-panel-title">显存 利用率</div>
      <div class="chart-legend">
        <div class="legend-item">
          <span class="legend-line solid" style="--c:var(--mem);background:var(--mem)"></span>
          <span>今日</span>
        </div>
        <div class="legend-item">
          <span class="legend-line dash" style="--c:var(--mem-ghost)"></span>
          <span style="color:var(--muted)">昨日</span>
        </div>
      </div>
      <div class="chart-wrap" id="mem-chart-wrap">
        <canvas id="mem-chart"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script type="module">
import { loginLockBot, fetchLockBotList, fetchMonqueryUtilization, MONITORED_NODES } from './api.js';
import { adaptNodeData } from './adapter.js';

const SLOT_COUNT = 288;
const tooltip = document.getElementById('tooltip');

let token = null;
let currentWindow = 2;
let todayXpuMA = new Array(SLOT_COUNT).fill(0);
let todayMemMA = new Array(SLOT_COUNT).fill(0);
let yestXpuMA  = null;
let yestMemMA  = null;
let todayNodes = [];
let yestNodes  = [];
let refreshTimer = null;

// ── 选中日期 ──
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
document.getElementById('filter-date').value = getTodayStr();

function getSelectedDate() {
  const v = document.getElementById('filter-date').value;
  return v ? new Date(v + 'T00:00:00') : new Date();
}

// ── Chart margins ──
const MARGIN = { top: 10, right: 16, bottom: 20, left: 48 };
// Y 轴刻度：XPU 0-50 每 5%，显存 0-100 每 10%
const XPU_TICKS = [0, 5, 10, 15, 20, 25, 30, 35];
const MEM_TICKS = [0, 10, 20, 30, 40, 50, 60, 70];

// ── 工具函数 ──

function formatDateStart(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}000000`;
}
function formatDateTime(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  const h = String(d.getHours()).padStart(2,'0'), min = String(d.getMinutes()).padStart(2,'0'), s = String(d.getSeconds()).padStart(2,'0');
  return `${y}${m}${day}${h}${min}${s}`;
}
function formatDateEnd(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}235959`;
}

// ── Token ──

const SESSION_KEY = 'xpu_monitor_session';
function saveSession() {
  try { const u = document.getElementById('login-username').value.trim(); localStorage.setItem(SESSION_KEY, JSON.stringify({ token, username: u, savedAt: Date.now() })); } catch(e){}
}
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch(e){} }
function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY); if (!raw) return null;
    const d = JSON.parse(raw); if (Date.now() - d.savedAt > 4*3600*1000) { clearSession(); return null; }
    return d;
  } catch(e) { clearSession(); return null; }
}

// ── 数据处理 ──

function processMonqueryData(monqueryData) {
  if (!monqueryData) return [];
  const dummyState = {};
  for (const id of MONITORED_NODES) dummyState[`gpu-node-${String(id).padStart(2,'0')}`] = {};
  return adaptNodeData(dummyState, monqueryData, 0, 'NODE', []).filter(n => n.hasMonqueryData);
}

function computeMA(nodes, windowSize) {
  const n = nodes.filter(x => x.hasMonqueryData);
  if (!n.length) return { xpu: new Array(SLOT_COUNT).fill(0), mem: new Array(SLOT_COUNT).fill(0) };

  const xpuSlot = new Array(SLOT_COUNT).fill(0);
  const memSlot = new Array(SLOT_COUNT).fill(0);
  for (let i = 0; i < SLOT_COUNT; i++) {
    let xs = 0, ms = 0;
    for (const node of n) { xs += node.avgUtil[i]; ms += node.avgMemUtil[i]; }
    xpuSlot[i] = xs / n.length;
    memSlot[i] = ms / n.length;
  }

  const xpuMA = new Array(SLOT_COUNT), memMA = new Array(SLOT_COUNT);
  for (let i = 0; i < SLOT_COUNT; i++) {
    const s = Math.max(0, i - windowSize + 1), cnt = i - s + 1;
    let xs = 0, ms = 0;
    for (let j = s; j <= i; j++) { xs += xpuSlot[j]; ms += memSlot[j]; }
    xpuMA[i] = xs / cnt;
    memMA[i] = ms / cnt;
  }
  return { xpu: xpuMA, mem: memMA };
}

// ── 登录 ──

async function handleLogin() {
  const u = document.getElementById('login-username').value.trim(), p = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn'), err = document.getElementById('login-error');
  if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
  btn.disabled = true; err.textContent = '';
  try {
    token = await loginLockBot(u, p);
    const bots = await fetchLockBotList(token);
    if (!bots || !bots.length) throw new Error('无可用 Bot');
    saveSession();
    document.getElementById('loading-msg').remove();
    await loadAndRender();
    startAutoRefresh();
  } catch (e) {
    if (token) { saveSession(); document.getElementById('loading-msg').remove(); startAutoRefresh(); return; }
    clearSession(); btn.disabled = false; err.textContent = `登录失败：${e.message}`;
  }
}
document.getElementById('login-btn').addEventListener('click', handleLogin);
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

// ── 窗口切换 ──

document.getElementById('window-toggles').addEventListener('click', e => {
  const btn = e.target.closest('.win-btn');
  if (!btn) return;
  document.querySelectorAll('.win-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentWindow = parseInt(btn.dataset.window, 10);
  if (todayNodes.length) {
    const td = computeMA(todayNodes, currentWindow);
    todayXpuMA = td.xpu; todayMemMA = td.mem;
    if (yestNodes.length) {
      const yd = computeMA(yestNodes, currentWindow);
      yestXpuMA = yd.xpu; yestMemMA = yd.mem;
    }
    drawAllCharts();
  }
});

// ── 日期变更 ──

document.getElementById('filter-date').addEventListener('change', () => {
  if (todayNodes.length) loadAndRender();
});

// ── 加载 ──

async function loadAndRender() {
  const selDate = getSelectedDate();
  const isToday = document.getElementById('filter-date').value === getTodayStr();

  const todayStart = formatDateStart(selDate);
  // 选今天时查到当前时刻，其他日期查全天
  const todayEnd = isToday ? formatDateTime(new Date()) : formatDateEnd(selDate);

  const yesterday = new Date(selDate); yesterday.setDate(yesterday.getDate() - 1);
  const yestStart = formatDateStart(yesterday), yestEnd = formatDateEnd(yesterday);

  const [todayData, yestData] = await Promise.all([
    fetchMonqueryUtilization(todayStart, todayEnd).catch(e => { console.error('Fetch failed:', e); return null; }),
    fetchMonqueryUtilization(yestStart, yestEnd).catch(e => { console.warn('Yesterday fetch failed:', e); return null; })
  ]);

  todayNodes = processMonqueryData(todayData);
  yestNodes  = processMonqueryData(yestData);

  const td = computeMA(todayNodes, currentWindow);
  todayXpuMA = td.xpu; todayMemMA = td.mem;

  if (yestNodes.length) {
    const yd = computeMA(yestNodes, currentWindow);
    yestXpuMA = yd.xpu; yestMemMA = yd.mem;
  } else {
    yestXpuMA = null; yestMemMA = null;
  }

  // 截断未来数据：今天只画到当前已完成槽，历史日期画全部
  if (isToday) {
    const now = new Date();
    cutoffSlot = Math.max(0, now.getHours() * 12 + Math.floor(now.getMinutes() / 5) - 1);
  } else {
    cutoffSlot = 287;
  }

  renderStatusBar(!!todayData, selDate, todayNodes.length);
  document.getElementById('charts-row').style.display = '';
  drawAllCharts();
}

// ── 状态栏 ──

function renderStatusBar(ok, selDate, nodeCount) {
  const bar = document.getElementById('status-bar');
  const isToday = document.getElementById('filter-date').value === getTodayStr();
  const dateStr = selDate.toLocaleDateString('zh-CN', { month:'numeric', day:'numeric' });
  const timeStr = isToday ? ' ' + new Date().toLocaleTimeString('zh-CN') : '';
  let cls = '', tag = '';
  if (!ok) { cls = 'error'; tag = 'ERROR'; }
  else { tag = isToday ? 'NORMAL' : 'HISTORY'; }

  bar.className = 'status-bar' + (cls ? ' ' + cls : '');
  bar.innerHTML = `<span class="status-dot"></span><span class="status-tag">${tag}</span><span class="status-node-count">${nodeCount} nodes · ${dateStr}${timeStr}</span><span class="status-time"></span>`;
  bar.style.display = 'flex';
}

// ── 图表绘制 ──

function drawChart(canvasId, todayData, yestData, color, ghostColor, yMax, yTicks, cutoffSlot) {
  const canvas = document.getElementById(canvasId);
  const wrap = canvas.parentElement;
  const ctx = canvas.getContext('2d');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  canvas.width = w; canvas.height = h;

  const plotW = w - MARGIN.left - MARGIN.right;
  const plotH = h - MARGIN.top - MARGIN.bottom;
  const maxSlot = Math.min(SLOT_COUNT - 1, cutoffSlot);

  // 水平 + 垂直网格线（深色虚线，一起绘制）
  ctx.save();
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = .8;
  ctx.setLineDash([4, 4]);
  yTicks.forEach(v => {
    const y = MARGIN.top + (1 - v / yMax) * plotH;
    ctx.beginPath();
    ctx.moveTo(MARGIN.left, y); ctx.lineTo(w - MARGIN.right, y);
    ctx.stroke();
  });
  for (let i = 0; i <= SLOT_COUNT; i += 24) {
    const x = MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
    ctx.beginPath();
    ctx.moveTo(x, MARGIN.top); ctx.lineTo(x, MARGIN.top + plotH);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();

  // Y 轴竖实线
  ctx.save();
  ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(MARGIN.left, MARGIN.top); ctx.lineTo(MARGIN.left, MARGIN.top + plotH);
  ctx.stroke();
  ctx.restore();

  // X 轴横实线（底部）
  ctx.save();
  ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(MARGIN.left, MARGIN.top + plotH); ctx.lineTo(w - MARGIN.right, MARGIN.top + plotH);
  ctx.stroke();
  ctx.restore();

  // X 轴时间标签（与网格线完全对齐）
  ctx.save();
  ctx.fillStyle = '#1e293b';
  ctx.font = '11px "SF Mono","JetBrains Mono",monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let i = 0; i < SLOT_COUNT; i += 24) {
    const x = MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
    const hh = Math.floor(i / 12), mm = i % 12 * 5;
    ctx.fillText(String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0'), x, MARGIN.top + plotH + 5);
  }
  ctx.restore();

  // Y 轴刻度标签 + 短线
  ctx.save();
  yTicks.forEach(v => {
    const y = MARGIN.top + (1 - v / yMax) * plotH;
    const isExtreme = (v === 0 || v === yMax);
    ctx.fillStyle = '#1e293b';
    ctx.font = (isExtreme ? 'bold ' : '') + '11px "SF Mono","JetBrains Mono",monospace';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(v + '%', MARGIN.left - 7, y);
    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(MARGIN.left - 4, y); ctx.lineTo(MARGIN.left, y); ctx.stroke();
  });
  ctx.restore();

  // 裁剪区域
  ctx.save();
  ctx.beginPath(); ctx.rect(MARGIN.left, MARGIN.top, plotW, plotH); ctx.clip();

  // 绘制昨日线条（虚线），画满全天不截断
  if (yestData) {
    ctx.strokeStyle = ghostColor; ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    for (let i = 0; i < SLOT_COUNT; i++) {
      const x = MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
      const v = Math.max(0, Math.min(yMax, yestData[i]));
      const y = MARGIN.top + (1 - v / yMax) * plotH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 绘制今日线条（实线），截至 maxSlot
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= maxSlot; i++) {
    const x = MARGIN.left + (i / (SLOT_COUNT - 1)) * plotW;
    const v = Math.max(0, Math.min(yMax, todayData[i]));
    const y = MARGIN.top + (1 - v / yMax) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.restore(); // 恢复裁剪

  // 存储图层信息用于 hover
  const layers = [{ data: todayData, color, label: '今' }];
  if (yestData) layers.push({ data: yestData, color: ghostColor, tipColor: color, label: '昨' });
  canvas._layers = layers;
  canvas._margins = MARGIN;
  canvas._plotW = plotW;
  canvas._plotH = plotH;
  canvas._yMax = yMax;

  // 快照
  const img = new Image(); img.src = canvas.toDataURL(); canvas._snapshot = img;
}

let cutoffSlot = 287;

function drawAllCharts() {
  if (!todayXpuMA.length) return;
  drawChart('xpu-chart', todayXpuMA, yestXpuMA, '#7c3aed', 'rgba(124,58,237,0.45)', 35, XPU_TICKS, cutoffSlot);
  drawChart('mem-chart', todayMemMA, yestMemMA, '#ea580c', 'rgba(234,88,12,0.45)', 70, MEM_TICKS, cutoffSlot);
}

function restoreSnapshot(canvas) {
  if (!canvas._snapshot) return;
  const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(canvas._snapshot, 0, 0);
}

// ── Hover ──

function bindHover(canvasId, accentColor) {
  const canvas = document.getElementById(canvasId);
  canvas.addEventListener('mousemove', e => {
    const layers = canvas._layers; if (!layers || !layers.length) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const m = canvas._margins, pw = canvas._plotW, ph = canvas._plotH;
    if (!m) return;
    const plotX = x - m.left;
    const ci = Math.max(0, Math.min(SLOT_COUNT - 1, Math.round(plotX / pw * (SLOT_COUNT - 1))));
    if (plotX < 0 || plotX > pw) { tooltip.style.display = 'none'; restoreSnapshot(canvas); return; }

    restoreSnapshot(canvas);
    const ctx = canvas.getContext('2d');
    // 裁剪区域
    ctx.save();
    ctx.beginPath(); ctx.rect(m.left, m.top, pw, ph); ctx.clip();
    // 竖线
    const cx = m.left + (ci / (SLOT_COUNT - 1)) * pw;
    ctx.strokeStyle = 'rgba(100,116,139,0.5)'; ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, m.top); ctx.lineTo(cx, m.top + ph); ctx.stroke();
    ctx.setLineDash([]);
    // 圆点
    const yMax = canvas._yMax || 100;
    layers.forEach(l => {
      const v = l.data[ci], dotX = cx;
      const dotY = m.top + (1 - v / yMax) * ph;
      ctx.beginPath(); ctx.arc(dotX, dotY, 4, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = l.color; ctx.lineWidth = 2; ctx.stroke();
    });
    ctx.restore();

    // 构建卡片式 tooltip
    const hh = Math.floor(ci / 12), mm = (ci % 12) * 5;
    const timeStr = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    let html = `<div class="t-time">${timeStr}</div>`;
    layers.forEach(l => {
      const tc = l.tipColor || l.color;
      html += `<div class="t-row"><span class="t-dot" style="background:${tc}"></span><span class="t-label">${l.label}</span><span class="t-val" style="color:${tc}">${l.data[ci].toFixed(1)}%</span></div>`;
    });
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    tooltip.style.borderColor = accentColor;
    // 定位：竖线右侧，垂直居中于数据点区域
    const tx = rect.left + cx + 14;
    const ty = rect.top + m.top + ph * 0.15;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = Math.min(tx, rect.right - tw - 6) + 'px';
    tooltip.style.top = Math.max(rect.top, ty) + 'px';
  });
  canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; restoreSnapshot(canvas); });
}

bindHover('xpu-chart', '#7c3aed');
bindHover('mem-chart', '#ea580c');

window.addEventListener('resize', () => { if (todayXpuMA.length) drawAllCharts(); });

// ── 自动刷新 ──

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    if (document.hidden) return;
    // 仅今天自动刷新，历史日期数据不变
    if (document.getElementById('filter-date').value !== getTodayStr()) return;
    try { await loadAndRender(); } catch(e) { console.error('Auto-refresh:', e); }
  }, 60000);
}

// ── 启动 ──

(async function autoLogin() {
  const saved = restoreSession();
  if (saved && saved.token) {
    try {
      token = saved.token;
      const bots = await fetchLockBotList(token);
      if (bots && bots.length) {
        document.getElementById('loading-msg').remove();
        await loadAndRender(); startAutoRefresh(); return;
      }
    } catch(e) { console.error('Session restore failed:', e); }
    clearSession(); token = null;
  }
  try {
    token = await loginLockBot('admin', 'admin123');
    const bots = await fetchLockBotList(token);
    if (!bots || !bots.length) throw new Error('无可用 Bot');
    saveSession();
    document.getElementById('loading-msg').remove();
    await loadAndRender(); startAutoRefresh();
  } catch(e) {
    console.error('Auto-login failed:', e);
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-form').style.display = '';
    document.getElementById('login-error').textContent = '自动登录失败，请手动输入账号密码';
  }
})();
