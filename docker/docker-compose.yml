services:
  lockbot:
    image: lockbot:latest
    container_name: lockbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./lockbot.env
    volumes:
      # Persistent data: SQLite DB + per-bot state files. Survives container recreation.
      - ./data:/data
    environment:
      DATA_DIR: /data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/',timeout=4).status<500 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
